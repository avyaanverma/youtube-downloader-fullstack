<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320, initial-scale=1.0">
  <title>YouLaugh - Video Downloader</title>
  <style>
    :root {
      --bg-main: #35393c;
      --bg-card: #232629;
      --accent: #b6aaff;
      --button: #aaf7e2;
      --text-main: #fff;
      --text-muted: #cfcfcf;
      --text-accent: #232629;
      --radius: 16px;
      --font-main: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }
    body {
      background: var(--bg-main);
      color: var(--text-main);
      font-family: var(--font-main);
      width: 370px;
      margin: 0;
      padding: 0;
      border-radius: var(--radius);
      box-sizing: border-box;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px 0 24px;
      box-sizing: border-box;
    }
    .logo {
      font-size: 2rem;
      font-family: 'Comic Sans MS', 'Comic Sans', cursive;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .play-btn {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #7ecbff 60%, #b6aaff 100%);
      border: none;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 8px #0002;
    }
    .main-content {
      display: flex;
      flex-direction: row;
      width: 100%;
      padding: 18px 24px 0 24px;
      box-sizing: border-box;
      gap: 18px;
    }
    .thumb {
      width: 120px;
      height: 80px;
      background: var(--bg-card);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: var(--text-muted);
      font-family: 'Comic Sans MS', 'Comic Sans', cursive;
    }
    .video-info {
      flex: 1;
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 120px;
      min-height: 80px;
      color: var(--text-main);
      font-size: 1rem;
      gap: 4px;
    }
    .video-title {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 2px;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .video-channel {
      font-size: 0.95rem;
      color: var(--text-muted);
    }
    .video-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .options {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 24px;
      padding: 0 24px 24px 24px;
      box-sizing: border-box;
    }
    .action-btn {
      background: var(--button);
      color: var(--text-accent);
      border: none;
      border-radius: var(--radius);
      padding: 12px 0;
      font-size: 1.1rem;
      font-family: 'Comic Sans MS', 'Comic Sans', cursive;
      font-weight: 500;
      cursor: pointer;
      outline: none;
      box-shadow: 0 1px 4px #0001;
      transition: background 0.2s;
    }
    .action-btn:hover {
      background: #b6ffe2;
    }
    .action-btn:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }
    .formats-status {
      font-size: 0.9rem;
      color: var(--text-muted);
      min-height: 18px;
    }
    .formats-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }
    .format-card {
      background: var(--bg-card);
      color: var(--text-main);
      border: none;
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 0.95rem;
      text-align: left;
      cursor: pointer;
      outline: none;
      box-shadow: 0 1px 4px #0001;
      transition: background 0.2s;
    }
    .format-card:hover {
      background: #2c3033;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">YouLaugh</span>
    <button class="play-btn" title="Play video">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="5,3 17,10 5,17" fill="#fff"/>
      </svg>
    </button>
  </div>
  <div class="main-content">
    <div class="thumb">img</div>
    <div class="video-info">
      <div class="video-title">video title</div>
      <div class="video-channel">channel name</div>
      <div class="video-desc">description</div>
    </div>
  </div>
  <div class="options">
    <button id="get-formats-btn" class="action-btn">Get Formats</button>
    <div id="formats-status" class="formats-status">Open a YouTube video to fetch formats.</div>
    <div id="formats-container" class="formats-container"></div>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
